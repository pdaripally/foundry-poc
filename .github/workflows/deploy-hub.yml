name: Deploy Regional Hub

# Deploys 14 resource groups for a given regional hub into a single
# Azure subscription (GO-SM-aios). All 13 Foundry RGs are deployed in
# parallel via matrix strategy; the Shared Services (APIM) RG follows.
#
# Resource groups are pre-created by this workflow before each deployment.
# Custom RBAC roles (Foundry Project Admin + User) are applied once per
# subscription before the matrix runs.
#
# Required GitHub Environment: amr | emea | apac
# Required secrets per environment:
#   AZURE_CLIENT_ID      вЂ” Federated OIDC app registration client ID
#   AZURE_SUBSCRIPTION_ID вЂ” Target subscription (GO-SM-aios)
#   AZURE_TENANT_ID      вЂ” Entra ID tenant ID (repo/org secret)
#   APIM_PUBLISHER_EMAIL вЂ” APIM service publisher email

on:
  workflow_dispatch:
    inputs:
      hub:
        description: "Regional hub to deploy"
        required: true
        type: choice
        options: [amr, emea, apac]
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [nonprod, uat, prod]
        default: nonprod
      dry_run:
        description: "Dry run (what-if preview вЂ” no deployment)"
        required: false
        type: boolean
        default: false
      tiers:
        description: "Comma-separated tiers to deploy (leave blank for all 13)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

# в”Ђв”Ђ Job 1: Deploy 13 Foundry Resource Groups (parallel matrix) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
jobs:
  deploy-foundry-rgs:
    name: "[${{ inputs.hub }}] ${{ matrix.tier }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.hub }}-${{ inputs.environment }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        tier: [mfs, gf-audit, gf-advisory, gf-tax, g9-us, g9-ca, g9-uk, g9-de, g9-fr, g9-nl, g9-au, g9-jp, g9-cn]

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read hub config
        id: cfg
        run: |
          CFG=$(cat infra/hubs/${{ inputs.hub }}/config.json)
          LOCATION=$(echo "$CFG" | jq -r '.location')
          TIER_CFG=$(echo "$CFG" | jq -c '.tiers["${{ matrix.tier }}"]')
          VNET=$(echo "$TIER_CFG" | jq -r '.vnet')
          PE=$(echo "$TIER_CFG"   | jq -r '.pe')
          INJECT=$(echo "$TIER_CFG" | jq -r '.inject')
          echo "location=$LOCATION"  >> $GITHUB_OUTPUT
          echo "vnet=$VNET"          >> $GITHUB_OUTPUT
          echo "pe=$PE"              >> $GITHUB_OUTPUT
          echo "inject=$INJECT"      >> $GITHUB_OUTPUT

      - name: Ensure resource group exists
        if: inputs.dry_run != true
        run: |
          az group create \
            --name rg-agentops-${{ matrix.tier }}-${{ inputs.hub }} \
            --location "${{ steps.cfg.outputs.location }}" \
            --tags HubRegion=${{ inputs.hub }} FoundryTier=${{ matrix.tier }} \
                   ManagedBy=foundry-platform Environment=${{ inputs.environment }} \
            --output none

      - name: Deploy approved-models policy definition (subscription scope)
        if: inputs.dry_run != true
        run: |
          MODELS=$(cat infra/hubs/${{ inputs.hub }}/models.json | jq -c '[.[].modelName]')
          az deployment sub create \
            --name "policy-${{ matrix.tier }}-${{ inputs.hub }}-$(date +%Y%m%d%H%M%S)" \
            --location "${{ steps.cfg.outputs.location }}" \
            --template-file - <<BICEP
          targetScope = 'subscription'
          resource approvedModelsPolicy 'Microsoft.Authorization/policyDefinitions@2021-06-01' = {
            name: 'foundry-approved-models-${{ matrix.tier }}-${{ inputs.hub }}'
            properties: {
              policyType: 'Custom'
              mode: 'All'
              displayName: '${{ matrix.tier }} ${{ inputs.hub }} вЂ” Foundry approved model deployments only'
              parameters: {}
              policyRule: {
                if: { allOf: [
                  { field: 'type'; equals: 'Microsoft.CognitiveServices/accounts/deployments' }
                  { field: 'Microsoft.CognitiveServices/accounts/deployments/model.name'; notIn: ${MODELS} }
                ] }
                then: { effect: 'Deny' }
              }
            }
          }
          BICEP
          ) 2>/dev/null || true

      - name: What-if вЂ” ${{ matrix.tier }} RG
        if: inputs.dry_run == true
        run: |
          az deployment group what-if \
            --resource-group rg-agentops-${{ matrix.tier }}-${{ inputs.hub }} \
            --template-file infra/hubs/foundry-rg.bicep \
            --parameters hub=${{ inputs.hub }} \
                         tier=${{ matrix.tier }} \
                         location=${{ steps.cfg.outputs.location }} \
                         vnetAddressPrefix=${{ steps.cfg.outputs.vnet }} \
                         peSubnetAddressPrefix=${{ steps.cfg.outputs.pe }} \
                         vnetInjectionSubnetAddressPrefix=${{ steps.cfg.outputs.inject }} \
                         environment=${{ inputs.environment }} \
                         costCenter="${{ vars.COST_CENTER }}" \
                         "approvedModelDeployments=$(cat infra/hubs/${{ inputs.hub }}/models.json)"

      - name: Deploy вЂ” ${{ matrix.tier }} RG
        id: deploy
        if: inputs.dry_run != true
        run: |
          OUTPUT=$(az deployment group create \
            --name "deploy-${{ matrix.tier }}-${{ inputs.hub }}-$(date +%Y%m%d%H%M%S)" \
            --resource-group rg-agentops-${{ matrix.tier }}-${{ inputs.hub }} \
            --template-file infra/hubs/foundry-rg.bicep \
            --parameters hub=${{ inputs.hub }} \
                         tier=${{ matrix.tier }} \
                         location=${{ steps.cfg.outputs.location }} \
                         vnetAddressPrefix=${{ steps.cfg.outputs.vnet }} \
                         peSubnetAddressPrefix=${{ steps.cfg.outputs.pe }} \
                         vnetInjectionSubnetAddressPrefix=${{ steps.cfg.outputs.inject }} \
                         environment=${{ inputs.environment }} \
                         costCenter="${{ vars.COST_CENTER }}" \
                         "approvedModelDeployments=$(cat infra/hubs/${{ inputs.hub }}/models.json)" \
            --query properties.outputs \
            --output json)

          echo "foundryEndpoint=$(echo $OUTPUT | jq -r '.foundryEndpoint.value')"   >> $GITHUB_OUTPUT
          echo "foundryPrincipalId=$(echo $OUTPUT | jq -r '.foundryPrincipalId.value')" >> $GITHUB_OUTPUT

      - name: Summary вЂ” ${{ matrix.tier }}
        if: inputs.dry_run != true
        run: |
          echo "| ${{ matrix.tier }} | rg-agentops-${{ matrix.tier }}-${{ inputs.hub }} | ${{ steps.deploy.outputs.foundryEndpoint }} |" >> $GITHUB_STEP_SUMMARY

# в”Ђв”Ђ Job 2: Deploy custom RBAC roles (once per subscription) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  deploy-rbac-roles:
    name: "[${{ inputs.hub }}] Custom RBAC Roles"
    runs-on: ubuntu-latest
    environment: ${{ inputs.hub }}-${{ inputs.environment }}
    if: inputs.dry_run != true

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read hub config location
        id: cfg
        run: echo "location=$(cat infra/hubs/${{ inputs.hub }}/config.json | jq -r '.location')" >> $GITHUB_OUTPUT

      - name: Deploy custom RBAC roles
        run: |
          az deployment sub create \
            --name "rbac-${{ inputs.hub }}-$(date +%Y%m%d%H%M%S)" \
            --location "${{ steps.cfg.outputs.location }}" \
            --template-file infra/modules/rbac/custom-roles.bicep \
            --output none

# в”Ђв”Ђ Job 3: Deploy Shared Services (APIM) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Runs after all 13 Foundry RGs and RBAC; collects their endpoints dynamically.
  deploy-shared-apim:
    name: "[${{ inputs.hub }}] Shared Services (APIM)"
    runs-on: ubuntu-latest
    environment: ${{ inputs.hub }}-${{ inputs.environment }}
    needs: [deploy-foundry-rgs, deploy-rbac-roles]
    if: inputs.dry_run != true

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Read hub config
        id: cfg
        run: |
          CFG=$(cat infra/hubs/${{ inputs.hub }}/config.json)
          echo "location=$(echo "$CFG" | jq -r '.location')"        >> $GITHUB_OUTPUT
          echo "vnet=$(echo "$CFG" | jq -r '.tiers.shared.vnet')"   >> $GITHUB_OUTPUT
          echo "pe=$(echo "$CFG" | jq -r '.tiers.shared.pe')"       >> $GITHUB_OUTPUT
          echo "apim=$(echo "$CFG" | jq -r '.tiers.shared.apim')"   >> $GITHUB_OUTPUT

      - name: Collect Foundry endpoints from deployed RGs
        id: endpoints
        run: |
          TIERS=(mfs gf-audit gf-advisory gf-tax g9-us g9-ca g9-uk g9-de g9-fr g9-nl g9-au g9-jp g9-cn)
          BACKENDS="["
          for TIER in "${TIERS[@]}"; do
            RG="rg-agentops-${TIER}-${{ inputs.hub }}"
            FOUNDRY_NAME="foundry-${TIER}-${{ inputs.hub }}"
            ENDPOINT=$(az cognitiveservices account show \
              --name "$FOUNDRY_NAME" \
              --resource-group "$RG" \
              --query properties.endpoint \
              --output tsv 2>/dev/null || echo "")
            if [ -n "$ENDPOINT" ]; then
              BACKENDS="${BACKENDS}{\"tier\":\"${TIER}\",\"endpoint\":\"${ENDPOINT}\"},"
            fi
          done
          BACKENDS="${BACKENDS%,}]"
          echo "backends=$BACKENDS" >> $GITHUB_OUTPUT

      - name: Ensure shared resource group exists
        run: |
          az group create \
            --name rg-agentops-shared-${{ inputs.hub }} \
            --location "${{ steps.cfg.outputs.location }}" \
            --tags HubRegion=${{ inputs.hub }} FoundryTier=shared \
                   ManagedBy=foundry-platform Environment=${{ inputs.environment }} \
            --output none

      - name: Deploy вЂ” Shared Services (APIM) RG
        id: deploy
        run: |
          OUTPUT=$(az deployment group create \
            --name "deploy-shared-${{ inputs.hub }}-$(date +%Y%m%d%H%M%S)" \
            --resource-group rg-agentops-shared-${{ inputs.hub }} \
            --template-file infra/hubs/shared-rg.bicep \
            --parameters hub=${{ inputs.hub }} \
                         location=${{ steps.cfg.outputs.location }} \
                         environment=${{ inputs.environment }} \
                         costCenter="${{ vars.COST_CENTER }}" \
                         entraIdTenantId=${{ secrets.AZURE_TENANT_ID }} \
                         publisherEmail="${{ secrets.APIM_PUBLISHER_EMAIL }}" \
                         "foundryBackends=${{ steps.endpoints.outputs.backends }}" \
            --query properties.outputs \
            --output json)

          echo "apimGatewayUrl=$(echo $OUTPUT   | jq -r '.apimGatewayUrl.value')"   >> $GITHUB_OUTPUT
          echo "apimPrincipalId=$(echo $OUTPUT  | jq -r '.apimPrincipalId.value')"  >> $GITHUB_OUTPUT

      - name: Grant APIM MI в†’ Azure AI User on all 13 Foundry accounts
        env:
          AZURE_AI_USER_ROLE: bef2f8c4-8176-4b1f-bcfe-42e15a4d4a5d
          APIM_PRINCIPAL_ID: ${{ steps.deploy.outputs.apimPrincipalId }}
        run: |
          TIERS=(mfs gf-audit gf-advisory gf-tax g9-us g9-ca g9-uk g9-de g9-fr g9-nl g9-au g9-jp g9-cn)
          for TIER in "${TIERS[@]}"; do
            FOUNDRY_ID=$(az cognitiveservices account show \
              --name "foundry-${TIER}-${{ inputs.hub }}" \
              --resource-group "rg-agentops-${TIER}-${{ inputs.hub }}" \
              --query id --output tsv 2>/dev/null || echo "")
            if [ -n "$FOUNDRY_ID" ]; then
              az role assignment create \
                --assignee-object-id "$APIM_PRINCIPAL_ID" \
                --assignee-principal-type ServicePrincipal \
                --role "$AZURE_AI_USER_ROLE" \
                --scope "$FOUNDRY_ID" \
                --output none 2>/dev/null || echo "Role already exists for ${TIER}"
            fi
          done

      - name: Hub deployment summary
        run: |
          echo "## ${{ inputs.hub }} Hub Deployed вњ…" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | Resource Group | Type |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          i=1
          for TIER in mfs gf-audit gf-advisory gf-tax g9-us g9-ca g9-uk g9-de g9-fr g9-nl g9-au g9-jp g9-cn; do
            echo "| $i | rg-agentops-${TIER}-${{ inputs.hub }} | Foundry |" >> $GITHUB_STEP_SUMMARY
            i=$((i+1))
          done
          echo "| 14 | rg-agentops-shared-${{ inputs.hub }} | APIM Gateway |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APIM Gateway:** ${{ steps.deploy.outputs.apimGatewayUrl }}" >> $GITHUB_STEP_SUMMARY
